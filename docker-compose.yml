services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Warehouse-System}
      APP_ENV: ${APP_ENV:-production}
      BASE_URL: ${BASE_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET}

      # Default ist BEWUSST ein absoluter Pfad (4 Slashes nach sqlite:),
      # damit die SQLite-Datei im persistenten Volume warehouse_app_data
      # landet. Ein relativer Pfad würde im Container zu /app/app/data/...
      # auflösen und außerhalb des Volumes liegen → Datenverlust beim
      # Redeploy.
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/app.db}
      DB_AUTO_CREATE_SCHEMA: ${DB_AUTO_CREATE_SCHEMA:-true}
      WMS_SEED_LEGACY_ON_STARTUP: ${WMS_SEED_LEGACY_ON_STARTUP:-false}

      HARDWARE_IMPORT_PATH: ${HARDWARE_IMPORT_PATH:-/app/data/hardware_imports}
      BACKUP_PATH: ${BACKUP_PATH:-/app/data/backups}

      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD}
      INITIAL_ADMIN_NAME: ${INITIAL_ADMIN_NAME:-Admin}

    volumes:
      - warehouse_app_data:/app/data

    ports:
      - "${BACKEND_PORT:-8001}:8000"

    # Healthcheck nutzt den schlanken /health-Endpoint (kein DB-Roundtrip),
    # damit kurzzeitige DB-Last den Healthcheck nicht auf "unhealthy" zieht.
    # Bei dauerhaftem Ausfall stoppt Docker/Portainer den Restart-Loop nicht —
    # zusammen mit ``restart: unless-stopped`` wird ein toter Worker automatisch
    # neugestartet.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status == 200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_API_BASE: ${VITE_API_BASE:-}
        VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-http://backend:8000}
    restart: unless-stopped
    depends_on:
      - backend

    ports:
      - "${FRONTEND_PORT:-8080}:4173"

volumes:
  warehouse_app_data:
